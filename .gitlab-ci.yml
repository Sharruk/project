stages:
  - build
  - test
  - deploy

build-job:
  stage: build
  script:
    - echo "Installing dependencies"
    - echo "Building project"

test-job:
  stage: test
  script:
    - echo "Running tests"

deploy-job:
  stage: deploy
  script:
    - echo "Deploying application"


pages:
  stage: deploy
  script:
    - mkdir public
    - cp index.html public/
    - cp style.css public/ || true
    - cp script.js public/ || true
  artifacts:
    paths:
      - public
  only:
    - main



pages:
  stage: deploy
  script:
    - mkdir public
    - cp f.html public/index.html
  artifacts:
    paths:
      - public
  only:
    - main
